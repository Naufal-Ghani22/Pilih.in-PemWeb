<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih.in - Tes Minat Bakat</title>
    <link href="./src/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="./js/tes.js"></script>
</body>
</html>
</head>
<body class="bg-base font-sans text-slate-800 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden relative">

        <div id="intro-section" class="p-8 md:p-12 text-center block">
            <div class="w-20 h-20 bg-secondary/30 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            </div>
            <h2 class="text-3xl font-bold text-slate-800 mb-4">Tes Minat & Bakat Pilih.in</h2>
            <p class="text-slate-500 mb-8 leading-relaxed">
                Tes ini terdiri dari beberapa pertanyaan singkat untuk memetakan kepribadian dan gaya belajarmu. 
                <br><br>
                <span class="font-semibold text-primary">Instruksi:</span> Tidak ada jawaban benar atau salah. Jawablah sejujur mungkin sesuai dengan kata hatimu. Waktu pengerjaan sekitar 3-5 menit.
            </p>
            <button onclick="mulaiTes()" class="w-full sm:w-auto bg-primary text-white font-semibold py-3 px-8 rounded-full hover:shadow-lg hover:opacity-90 transition duration-300">
                Mulai Tes Sekarang
            </button>
        </div>

        <div id="quiz-section" class="p-8 md:p-12 hidden">
            
            <div class="mb-8">
                <div class="flex justify-between text-sm font-semibold text-slate-500 mb-2">
                    <span id="progress-text">Pertanyaan 1 dari 5</span>
                    <span id="progress-percentage">0%</span>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-primary h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div class="mb-8">
                <h3 id="question-text" class="text-xl md:text-2xl font-bold text-slate-800 mb-6 leading-snug">
                    </h3>

                <div id="options-container" class="space-y-3">
                    </div>
            </div>

            <div class="flex justify-between items-center pt-6 border-t border-slate-100">
                <button id="btn-prev" onclick="soalSebelumnya()" class="text-slate-500 font-semibold hover:text-primary transition hidden">
                    &larr; Sebelumnya
                </button>
                
                <div class="ml-auto">
                    <button id="btn-next" onclick="soalSelanjutnya()" class="bg-slate-200 text-slate-500 cursor-not-allowed font-semibold py-2 px-6 rounded-lg transition" disabled>
                        Selanjutnya
                    </button>
                    <button id="btn-submit" onclick="selesaiTes()" class="bg-primary text-white font-semibold py-2 px-6 rounded-lg hover:shadow-lg hover:opacity-90 transition hidden">
                        Lihat Hasil
                    </button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
